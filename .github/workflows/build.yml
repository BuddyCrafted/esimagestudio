name: Build ES Image Studio

# Triggers: push a tag like "v1.0.0" OR click "Run workflow" manually in GitHub
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ── Windows → produces ES_Image_Studio_Setup.exe ─────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r desktop_requirements.txt

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller desktop.py `
            --onedir --windowed `
            --name "ES Image Studios" `
            --icon icon.ico `
            "--add-data=app.py;." `
            --collect-all rembg `
            --collect-all onnxruntime `
            --collect-all webview `
            --hidden-import fastapi `
            --hidden-import uvicorn `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import starlette `
            --hidden-import PIL `
            --hidden-import anyio `
            --hidden-import "anyio._backends._asyncio" `
            --hidden-import h11 `
            --hidden-import python_multipart `
            --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          # Find ISCC.exe — Chocolatey puts it here
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found. Inno Setup may not have installed correctly."
          }
          Write-Host "Using: $iscc"
          & $iscc installer.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ES-Image-Studio-Windows
          path: Output/ES_Image_Studio_Setup.exe

  # ── Mac → produces ES_Image_Studio_Mac.dmg ───────────────────────────────
  build-mac:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r desktop_requirements.txt
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-WebKit pyobjc-framework-AppKit

      - name: Convert icon to icns
        run: |
          mkdir -p icon.iconset
          python3 -c "
from PIL import Image
img = Image.open('icon.ico').convert('RGBA')
for px, name in [(16,'16x16'),(32,'32x32'),(64,'64x64'),(128,'128x128'),(256,'256x256'),(512,'512x512'),(1024,'512x512@2x')]:
    img.resize((px,px), Image.LANCZOS).save(f'icon.iconset/icon_{name}.png')
"
          iconutil -c icns icon.iconset -o icon.icns

      - name: Build with PyInstaller
        run: |
          pyinstaller desktop.py \
            --onedir --windowed \
            --name "ES Image Studios" \
            --icon icon.icns \
            --osx-bundle-identifier com.easternstudios.imagestudio \
            --add-data "app.py:." \
            --collect-all rembg \
            --collect-all onnxruntime \
            --collect-all webview \
            --hidden-import fastapi \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import starlette \
            --hidden-import PIL \
            --hidden-import anyio \
            --hidden-import "anyio._backends._asyncio" \
            --hidden-import h11 \
            --hidden-import python_multipart \
            --hidden-import Foundation \
            --hidden-import AppKit \
            --hidden-import WebKit \
            --noconfirm

      - name: Create DMG
        run: |
          mkdir dmg_src
          cp -r "dist/ES Image Studios.app" dmg_src/
          ln -s /Applications dmg_src/Applications
          hdiutil create \
            -volname "ES Image Studio" \
            -srcfolder dmg_src \
            -ov -format UDZO \
            ES_Image_Studio_Mac.dmg

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: ES-Image-Studio-Mac
          path: ES_Image_Studio_Mac.dmg

  # ── Linux → produces ES_Image_Studio.AppImage ────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system libraries
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            gir1.2-webkit2-4.0 \
            fuse libfuse2

      - name: Install Python dependencies
        run: pip install -r desktop_requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller desktop.py \
            --onedir --windowed \
            --name "ES Image Studios" \
            --add-data "app.py:." \
            --collect-all rembg \
            --collect-all onnxruntime \
            --collect-all webview \
            --hidden-import fastapi \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import starlette \
            --hidden-import PIL \
            --hidden-import anyio \
            --hidden-import "anyio._backends._asyncio" \
            --hidden-import h11 \
            --hidden-import python_multipart \
            --noconfirm

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin

          # Copy the built app into AppDir
          cp -r "dist/ES Image Studios/." AppDir/usr/bin/

          # Desktop entry (required by AppImage spec)
          cat > AppDir/ES_Image_Studio.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=ES Image Studio
          Exec=ES Image Studios
          Icon=es_image_studio
          Type=Application
          Categories=Graphics;
          DESKTOP

          # AppRun launcher
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF="$(readlink -f "$0")"
          HERE="$(dirname "$SELF")"
          exec "$HERE/usr/bin/ES Image Studios" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          # Download appimagetool and build
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir ES_Image_Studio.AppImage

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ES-Image-Studio-Linux
          path: ES_Image_Studio.AppImage

  # ── Create GitHub Release with all 3 builds attached ─────────────────────
  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ES Image Studio ${{ github.ref_name }}"
          body: |
            ## ES Image Studio ${{ github.ref_name }}

            Download the installer for your operating system:

            | Platform | File | Instructions |
            |----------|------|-------------|
            | **Windows** | `ES_Image_Studio_Setup.exe` | Run the installer, follow the wizard |
            | **Mac** | `ES_Image_Studio_Mac.dmg` | Open DMG, drag to Applications |
            | **Linux** | `ES_Image_Studio.AppImage` | `chmod +x` then double-click |

            > **First launch:** The app downloads the AI model (~500 MB) on first run. Make sure you have an internet connection.

            Built by Eastern Studios.
          files: |
            ES-Image-Studio-Windows/ES_Image_Studio_Setup.exe
            ES-Image-Studio-Mac/ES_Image_Studio_Mac.dmg
            ES-Image-Studio-Linux/ES_Image_Studio.AppImage
